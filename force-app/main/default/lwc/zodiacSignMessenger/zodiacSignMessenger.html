<template>
    <lightning-card title="Find your zodiac match">
        <lightning-input class="slds-p-around_medium" value={username} onchange={handleNameChange} type="text"
            label="Enter your name"></lightning-input>
        <lightning-input class="slds-p-around_medium" value={userdob} onchange={handleDateChange} type="date"
            name="input1" label="Enter your DOB"></lightning-input>
        <lightning-button class="slds-align_absolute-center slds-p-around_medium" variant="success"
            onclick={handleSubmit} label="Hit it!" title="Hit it!"></lightning-button>
    </lightning-card>

    <template lwc:if={resultsRecieved}>
        <article class="slds-card">
        <div class="slds-card__header slds-grid">
            <header class="slds-media slds-media_center slds-has-flexi-truncate">
                <div class="slds-media__figure">
                    <span class="slds-icon_container slds-icon-standard-account" title="account">
                        <svg class="slds-icon slds-icon_small" aria-hidden="true">
                            <use xlink:href="/assets/icons/standard-sprite/svg/symbols.svg#account"></use>
                        </svg>
                        <span class="slds-assistive-text">account</span>
                    </span>
                </div>
                <div class="slds-media__body">
                    <h2 class="slds-card__header-title">
                        <a href="#" class="slds-card__header-link slds-truncate" title="Accounts">
                            <span>Zodiac Sign Found !!!</span>
                        </a>
                    </h2>
                </div>
            </header>
        </div>
        <div class="slds-card__body slds-card__body_inner">{username} your Zodiac Sign is {userProfile.emoji}{userProfile.sign}</div>
        <div class="slds-card__body slds-card__body_inner">Your Zodiac Trait is {userProfile.trait}</div>
        <footer class="slds-card__footer">
            <div class="slds-card__footer-action">Zodiac Sign Found !!!
            </div>
        </footer>
    </article>
    </template>
    
</template>
