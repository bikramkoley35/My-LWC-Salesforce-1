<template>
    <div class="slds-card slds-p-around_medium">
        <button class="slds-button slds-button_brand" onclick={handleOption1}>Option 1</button>
        <button class="slds-button slds-button_brand" onclick={handleOption2}>Option 2</button>

        <template lwc:if={displaySetting}>
            <template lwc:if={displayfirst}>
                <div class="slds-card slds-m-around_medium slds-m-bottom_x-large">
                <p class="slds-m-around_medium">
                    Button-icon-statefuls with the <code>variant</code> attribute set to <code>border-inverse</code>.
                </p>

                <!-- Simple -->
                <div class="slds-p-around_medium lgc-bg-inverse">
                    <lightning-button-icon-stateful icon-name="utility:like" variant="border-inverse"
                        selected={likeStateInverse} onclick={handleLikeButtonInverseClick}
                        alternative-text="Like"></lightning-button-icon-stateful>
                    <lightning-button-icon-stateful icon-name="utility:answer" variant="border-inverse"
                        selected={answerStateInverse} onclick={handleAnswerButtonInverseClick} alternative-text="Answer"
                        class="slds-m-left_xx-small"></lightning-button-icon-stateful>
                </div>
            </div>

            </template>
            <template lwc:if={displaysecond}>
                <div class="slds-card slds-m-around_medium slds-m-bottom_x-large">
                <p class="slds-m-around_medium">
                    Button-icon-statefuls with the <code>variant</code> attribute set to <code>border-filled</code>.
                </p>

                <!-- Disabled -->
                <div class="slds-p-around_medium lgc-bg">
                    <lightning-button-icon-stateful icon-name="utility:like" variant="border-filled"
                        selected={likeStateFilled} onclick={handleLikeButtonFilledClick}
                        alternative-text="Like"></lightning-button-icon-stateful>
                    <lightning-button-icon-stateful icon-name="utility:answer" variant="border-filled"
                        selected={answerStateFilled} onclick={handleAnswerButtonFilledClick} alternative-text="Answer"
                        class="slds-m-left_xx-small"></lightning-button-icon-stateful>
                </div>
            </div>
            </template>
            
        </template>
        <template lwc:else>
            Nothing to show..
        </template>
    </div>

</template>
